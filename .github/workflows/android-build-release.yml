name: Build & Release Android App

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Recreate Gradle Wrapper (Fix corruption)
        run: gradle wrapper

      - name: Restore Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            base64 -d debug.keystore.base64 > debug.keystore
            echo "Restored debug.keystore from debug.keystore.base64"
          else
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
            echo "Generated new debug.keystore"
          fi

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Prepare APK for Upload
        run: |
          mkdir -p build-artifacts
          # Locate built APK
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          
          # Extract clean version info
          VERSION_NAME="latest"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION_NAME="${{ github.ref_name }}"
          fi
          
          # Copy to build-artifacts with clean name
          if [ -f "$RELEASE_APK" ]; then
            cp "$RELEASE_APK" "build-artifacts/Study-Cycle-${VERSION_NAME}-release.apk"
            echo "Copied release APK"
          else
            echo "Release APK not found"
            exit 1
          fi

      - name: Upload Build Artifacts to Workflow Run
        uses: actions/upload-artifact@v4
        with:
          name: Study-Cycle-Release-APK
          path: build-artifacts/Study-Cycle-*-release.apk
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build-artifacts/Study-Cycle-${{ github.ref_name }}-release.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
